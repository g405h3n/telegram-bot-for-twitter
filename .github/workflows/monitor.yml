name: Monitor Twitter and Send Telegram Notifications

on:
  schedule:
    - cron: "0 22 * * *" # 6:00 AM Asia/Shanghai (UTC+8, so 22:00 UTC)
  workflow_dispatch: # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor script
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_USERNAMES: ${{ secrets.TWITTER_USERNAMES }}
          TWITTER_LIST_ID: ${{ secrets.TWITTER_LIST_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python src/monitor.py

      - name: Commit state changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add state/
          git commit -m "Update state after monitoring run" || echo "No changes to commit"
